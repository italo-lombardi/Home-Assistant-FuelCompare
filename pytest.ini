[pytest]
testpaths = tests
# asyncio_mode = auto: all async test functions run under pytest-asyncio without
# needing @pytest.mark.asyncio decorators. Strict mode would require them explicitly.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    smoke: live-network smoke tests against real upstream APIs; skipped unless FUELCOMPARE_RUN_SMOKE=1
